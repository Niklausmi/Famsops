<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetCRM — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--surface:#111318;--surface2:#181c23;
  --border:rgba(255,255,255,0.07);--accent:#38d9f5;--accent2:#7b6fff;
  --text:#e8eaf0;--muted:#5a6070;--danger:#ff5f6d;--success:#3dffa0;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
body{font-family:var(--mono);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden}

/* animated bg grid */
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(56,217,245,0.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(56,217,245,0.03) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}

/* glows */
.glow1{position:fixed;top:-150px;left:-150px;width:500px;height:500px;
  background:radial-gradient(circle,rgba(123,111,255,0.08),transparent 70%);pointer-events:none}
.glow2{position:fixed;bottom:-100px;right:-100px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(56,217,245,0.07),transparent 70%);pointer-events:none}

.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;
  animation:fadeUp 0.5s ease}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-logo{text-align:center;margin-bottom:36px}
.login-logo .mark{width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:22px;font-weight:800;color:#0a0c0f;
  margin:0 auto 14px;box-shadow:0 0 30px rgba(56,217,245,0.25)}
.login-logo h1{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-0.5px}
.login-logo h1 span{color:var(--accent)}
.login-logo p{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}

.field{margin-bottom:18px}
.field label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:var(--mono);font-size:13px;
  padding:12px 14px;outline:none;transition:all 0.2s}
.field input:focus{border-color:rgba(56,217,245,0.4);
  box-shadow:0 0 0 3px rgba(56,217,245,0.08);background:rgba(56,217,245,0.03)}
.field input::placeholder{color:var(--muted)}
.field input.shake{animation:shake 0.35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:14px;padding:4px;transition:color 0.15s}
.pass-toggle:hover{color:var(--text)}

.login-btn{width:100%;padding:13px;border:none;border-radius:9px;
  background:linear-gradient(135deg,#7b6fff,#38d9f5);color:#0a0c0f;
  font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:6px}
.login-btn:hover{box-shadow:0 0 24px rgba(56,217,245,0.35);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.error-msg{margin-top:14px;padding:11px 14px;background:rgba(255,95,109,0.1);
  border:1px solid rgba(255,95,109,0.3);border-radius:8px;
  color:var(--danger);font-size:11px;display:none;text-align:center}

.role-hints{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.role-hints .rh-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;text-align:center}
.role-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.role-card{background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;cursor:pointer;transition:all 0.15s}
.role-card:hover{border-color:rgba(56,217,245,0.25);background:rgba(56,217,245,0.03)}
.role-card .rn{font-size:11px;color:var(--text);margin-bottom:2px}
.role-card .ru{font-size:10px;color:var(--muted)}

.login-footer{text-align:center;margin-top:24px;font-size:10px;color:var(--muted);letter-spacing:0.5px}
</style>
</head>
<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="login-wrap">

  <div class="login-logo">
    <div class="mark">FC</div>
    <h1>Fleet<span>CRM</span></h1>
    <p>Operations Management Suite</p>
  </div>

  <div class="login-card">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pass-toggle" onclick="togglePass()" id="passToggle">👁</button>
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="error-msg" id="errorMsg">⚠ Invalid username or password</div>

  <div class="login-footer">FleetCRM v1.0 &nbsp;·&nbsp; Secure Session</div>

</div>

<script src="crm-core.js"></script>
<script>
// Redirect if already logged in
if (crmCurrentUser()) window.location.href = 'dashboard.html';

function togglePass() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function quickLogin(u, p) {
  document.getElementById('username').value = u;
  document.getElementById('password').value = p;
  doLogin();
}

async function doLogin() {
  const u   = document.getElementById('username').value.trim();
  const p   = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!u || !p) { err.textContent = '⚠ Please enter username and password'; err.style.display = 'block'; return; }

  btn.disabled    = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';

  const user = await crmLogin(u, p);   // reads users.json

  if (user) {
    window.location.href = 'dashboard.html';
  } else {
    err.textContent = '⚠ Invalid username or password';
    err.style.display = 'block';
    document.getElementById('password').classList.add('shake');
    setTimeout(() => document.getElementById('password').classList.remove('shake'), 400);
    btn.disabled    = false;
    btn.textContent = 'Sign In →';
  }
}
</script>
</body>
</html>
